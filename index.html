<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITECA'27</title>
  <meta name="description" content="Register for ITECA'27 inter-college symposium. Competitions include Debugging, Blind Coding, Web Design, Poster Making, PPT Presentation and more." />
  <link rel="stylesheet" href="style.css" />
  <!-- QR Code library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loader-screen" id="loader">
    <div class="loader-spinner"></div>
  </div>

  <!-- Animated background orbs -->
  <div class="bg-effects">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Admin Login Modal -->
  <div class="modal-overlay" id="admin-modal">
    <div class="modal">
      <h3>🔐 Admin Login</h3>
      <div class="form-group">
        <label for="admin-user">Username</label>
        <input type="text" id="admin-user" placeholder="Enter username" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="admin-pass">Password</label>
        <input type="password" id="admin-pass" placeholder="Enter password" />
      </div>
      <button class="btn btn-primary" id="admin-login-btn" onclick="handleAdminLogin()">Login</button>
      <button class="btn btn-ghost mt-2" onclick="closeAdminModal()">Cancel</button>
    </div>
  </div>

  <div class="container">

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
      <div class="logo"><b>ITECA'27</b></div>
      <div class="nav-actions">
        <button class="btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        <button class="btn btn-ghost btn-sm" onclick="openAdminModal()">Admin</button>
      </div>
    </nav>

    <!-- Hero -->
    <section class="hero" id="hero">
      <h1>ITECA'27</h1>
      <p>Push your limits. Compete. Conquer. Register now for the most electrifying tech symposium of the year.</p>
      <a href="#competitions" class="btn btn-primary">Register Now ✨</a>
    </section>

    <!-- Countdown -->
    <div class="countdown-bar" id="countdown-bar">
      <div class="countdown-item"><div class="num" id="cd-days">00</div><div class="lbl">Days</div></div>
      <div class="countdown-item"><div class="num" id="cd-hours">00</div><div class="lbl">Hours</div></div>
      <div class="countdown-item"><div class="num" id="cd-mins">00</div><div class="lbl">Minutes</div></div>
      <div class="countdown-item"><div class="num" id="cd-secs">00</div><div class="lbl">Seconds</div></div>
    </div>

    <!-- Competitions -->
    <section id="competitions">
      <div class="competitions-grid" id="comp-grid">
        <!-- Cards generated by JS -->
      </div>
    </section>

    <!-- Registration Form -->
    <section class="form-section" id="reg-form-section">
      <div class="form-header">
        <h2 id="form-title">Register</h2>
        <p id="form-subtitle">Fill in your details below</p>
      </div>
      <form id="reg-form" onsubmit="return false;">
        <div class="form-group">
          <label for="roll-number">Roll Number</label>
          <input type="text" id="roll-number" placeholder="e.g. 23SUCA027" required />
        </div>
        <div class="form-group">
          <label for="participant-name">Name</label>
          <input type="text" id="participant-name" placeholder="Your full name" required />
        </div>

        <!-- Team members (dynamic) -->
        <div class="team-members-section hidden" id="team-section">
          <h4 id="team-title">Team Members</h4>
          <div id="team-members-container"></div>
          <button type="button" class="add-member-btn hidden" id="add-member-btn" onclick="addTeamMember()">+ Add Member</button>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="cancelRegistration()">Cancel</button>
          <button type="button" class="btn btn-primary" id="submit-btn" onclick="submitRegistration()">Submit ✨</button>
        </div>
      </form>
    </section>

    <!-- QR Code -->
    <section class="qr-section" id="qr-section">
      <h2>PARTICIPANT QR</h2>
      <div id="qr-code-container"></div>
     <!-- <p class="mt-2" style="font-size:0.75rem;color:var(--text-muted);" id="qr-url-text"></p> -->
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Made with 💜 for <strong>ITECA'27</strong> &copy; 2027</p>
    </footer>

  </div>

  <!-- ==========================================
       Firebase SDK (CDN — compatible with GitHub Pages)
       ========================================== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Firebase config + helpers -->
  <script src="firebase.js"></script>

  <!-- Main app logic -->
  <script src="app.js"></script>
</body>
</html>
